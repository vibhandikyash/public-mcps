name: Publish

# Trigger by pushing a tag of the form `resume-parser-mcp@x.y.z` or `git-insights-mcp@x.y.z`.
# The job inspects the tag prefix and publishes only the matching package.
on:
  push:
    tags:
      - "resume-parser-mcp@*"
      - "git-insights-mcp@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: pkg
        name: Determine package from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PKG="${TAG%@*}"
          VER="${TAG#*@}"
          echo "package=$PKG" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Publishing $PKG@$VER"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: ${{ steps.pkg.outputs.package }}/package-lock.json
      - name: Install
        working-directory: ${{ steps.pkg.outputs.package }}
        run: npm ci
      - name: Verify version matches tag
        working-directory: ${{ steps.pkg.outputs.package }}
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$PKG_VER" != "${{ steps.pkg.outputs.version }}" ]; then
            echo "Tag version ${{ steps.pkg.outputs.version }} does not match package.json $PKG_VER"
            exit 1
          fi
      - name: Build
        working-directory: ${{ steps.pkg.outputs.package }}
        run: npm run build
      - name: Test
        working-directory: ${{ steps.pkg.outputs.package }}
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global commit.gpgsign false
          npm test
      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
